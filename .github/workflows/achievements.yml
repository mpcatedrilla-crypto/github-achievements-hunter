name: GitHub Achievements Automation

on:
  workflow_dispatch:
  schedule:
    - cron: '0 0 * * 0'  # Weekly on Sunday

jobs:
  pull-shark:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Git
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
      
      - name: Create and Merge PR
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BRANCH="auto-$(date +%s)"
          git checkout -b $BRANCH
          echo "Automated update $(date)" >> auto-updates.log
          git add .
          git commit -m "chore: automated achievement update"
          git push origin $BRANCH
          
          # Create PR via API
          PR=$(curl -X POST \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github.v3+json" \
            https://api.github.com/repos/${{ github.repository }}/pulls \
            -d "{\"title\":\"Automated Update\",\"head\":\"$BRANCH\",\"base\":\"main\",\"body\":\"Automated PR for achievement tracking\"}" | jq -r '.number')
          
          # Merge PR
          curl -X PUT \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github.v3+json" \
            https://api.github.com/repos/${{ github.repository }}/pulls/$PR/merge \
            -d '{"merge_method":"squash"}'

  co-author-commit:
    runs-on: ubuntu-latest
    needs: pull-shark
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Git
        run: |
          git config user.name "GitHub Actions"
          git config user.email "actions@github.com"
      
      - name: Create Co-authored Commit
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BRANCH="coauthor-$(date +%s)"
          git checkout -b $BRANCH
          echo "Co-authored update $(date)" >> coauthor.log
          git add .
          git commit -m "feat: co-authored update

Co-authored-by: GitHub Actions <actions@github.com>
Co-authored-by: Achievement Hunter <hunter@example.com>"
          git push origin $BRANCH
          
          # Create and merge PR
          PR=$(curl -X POST \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github.v3+json" \
            https://api.github.com/repos/${{ github.repository }}/pulls \
            -d "{\"title\":\"Co-authored Update\",\"head\":\"$BRANCH\",\"base\":\"main\",\"body\":\"Co-authored commit for Pair Extraordinaire\"}" | jq -r '.number')
          
          curl -X PUT \
            -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
            -H "Accept: application/vnd.github.v3+json" \
            https://api.github.com/repos/${{ github.repository }}/pulls/$PR/merge \
            -d '{"merge_method":"squash"}'
